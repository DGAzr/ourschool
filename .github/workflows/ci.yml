name: CI

on:
  push:
    branches: [main, dev]
  # All PRs, regardless of target branch (release branches vary per cycle).
  pull_request:
  # Allows publish.yml to run CI as a gating prerequisite.
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ourschool_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      SECRET_KEY: ci-secret-key-not-for-production-1234567890
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/ourschool_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      # Report-only for now: the codebase has pre-existing lint/format debt.
      # Tighten to blocking once it's cleaned up.
      - name: Lint (ruff)
        run: ruff check app
        continue-on-error: true

      - name: Format check (black)
        run: black --check app
        continue-on-error: true

      - name: Dead code (vulture)
        run: vulture app --min-confidence 80 --ignore-names cls
        continue-on-error: true

      - name: Verify migrations apply cleanly
        run: alembic upgrade head

      - name: Run tests
        run: pytest

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Unused code (knip)
        run: npm run knip
        continue-on-error: true

      - name: Build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t ourschool-backend:ci .
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t ourschool-frontend:ci .
