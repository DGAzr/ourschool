services:
  db:
    # Only started when --profile local-db is used.
    # To use an external PostgreSQL database, omit this profile and set DATABASE_URL
    # (or DATABASE_HOST / DATABASE_PORT / DATABASE_NAME / DATABASE_USER / DATABASE_PASSWORD)
    # in your .env file, then run: docker-compose up backend frontend
    profiles: ["local-db"]
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ourschool}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      # Database configuration
      # Set DATABASE_URL to use an external PostgreSQL instance and skip the local db service.
      # If DATABASE_URL is set it takes precedence over the individual vars below.
      DATABASE_URL: ${DATABASE_URL:-}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-${POSTGRES_DB:-ourschool}}
      DATABASE_USER: ${DATABASE_USER:-${POSTGRES_USER:-postgres}}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-${POSTGRES_PASSWORD:-postgres}}

      # Security configuration
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}

      # Backend server configuration
      BACKEND_HOST: ${BACKEND_HOST:-0.0.0.0}
      BACKEND_PORT: ${BACKEND_PORT:-8000}

      # Logging configuration
      # BACKEND_LOG_LEVEL overrides LOG_LEVEL for this service only.
      # Valid values: DEBUG, INFO, WARNING, ERROR, CRITICAL
      LOG_LEVEL: ${BACKEND_LOG_LEVEL:-${LOG_LEVEL:-INFO}}
      LOG_FORMAT: ${BACKEND_LOG_FORMAT:-${LOG_FORMAT:-json}}

      # CORS configuration
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:4173,http://frontend:4173}
    depends_on:
      db:
        condition: service_healthy
        required: false  # skipped when db service is not running (external DB mode)
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./app:/app/app:ro
      - ./alembic:/app/alembic:ro
      - ./alembic.ini:/app/alembic.ini:ro
    command: ["./start.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Used by vite preview proxy to reach the backend service internally
      VITE_API_BASE_URL: http://backend:8000
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4173', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
